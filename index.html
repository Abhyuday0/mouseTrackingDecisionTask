<!DOCTYPE html>
<html>
<head>
    <title>Visual World Paradigm Experiment</title>
    <script src="https://unpkg.com/jspsych@8.2.2"></script>
    <script src="https://unpkg.com/regenerator-runtime/runtime.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-audio-keyboard-response@2.0.0"></script>
    <script src="https://unpkg.com/@jspsych/extension-example@1.0.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-initialize-camera@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/extension-record-video@1.0.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        .vwp-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: white;
        }
        .vwp-image {
            position: absolute;
            width: 400px;
            height: 400px;
            object-fit: contain;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.2s;
        }
        /* .vwp-image:hover {
            border-color: #4CAF50;
        }
        .vwp-image.clicked {
            border-color: #2196F3;
        } */

        /* Diagonal positioning - images centered at specified coordinates */
        .position-top-left {
            left: 25%;
            top: 25%;
            transform: translate(-50%, -50%);
        }
        .position-bottom-right {
            left: 75%;
            top: 75%;
            transform: translate(-50%, -50%);
        }
    </style>
    <script src="experiment.js" defer></script>
</head>
<body></body>
</html>
