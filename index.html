<!DOCTYPE html>
<html>
<head>
    <title>Visual World Paradigm Experiment</title>

    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-call-function@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/extension-mouse-tracking@1.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />

    <style>
        /* ── General reset ───────────────────────────────────────────────── */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
        }

        /* ── VWP trial layout ────────────────────────────────────────────── */
        .vwp-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-color: white;
        }

        .vwp-image {
            position: absolute;
            width: 300px;
            height: 300px;
            object-fit: contain;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.2s;
            /* centre the image on its anchor point */
            transform: translate(-50%, -50%);
        }

        .vwp-image:hover {
            border-color: #aaa;
        }

        /* Upper-left and upper-right corners */
        .position-top-left {
            left: 20%;
            top: 25%;
        }

        .position-top-right {
            left: 80%;
            top: 25%;
        }

        /* ── Start button ────────────────────────────────────────────────── */
        /*
         * jsPsych renders the button inside .jspsych-html-button-response-btngroup.
         * We override that container so the button sits at bottom-centre,
         * matching the Spivey et al. (2005) starting position.
         */
         
        .jspsych-html-button-response-btngroup {
            position: fixed !important;
            bottom: 40px !important;   /* distance from the BOTTOM edge */
            left: 50% !important;
            transform: translateX(-50%) !important;
            display: flex;
            justify-content: center;
        }
        
        .start-btn,
        .jspsych-html-button-response-button button {
            font-size: 20px;
            padding: 0;
            width: 44px;
            height: 44px;
            border-radius: 6px;
            border: 2px solid #555;
            background-color: #f5f5f5;
            cursor: pointer;
            transition: background-color 0.15s;
}
        /* .start-btn,
        .jspsych-html-button-response-button button {
            font-size: 18px;
            padding: 14px 40px;
            border-radius: 8px;
            border: 2px solid #555;
            background-color: #f5f5f5;
            cursor: pointer;
            transition: background-color 0.15s;
        } */

        .start-btn:hover,
        .jspsych-html-button-response-button button:hover {
            background-color: #ddd;
        }

        /* Hide the default jsPsych content wrapper margin during button screen */
        .jspsych-content-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

    <script src="experiment.js" defer></script>
</head>
<body></body>
</html>
